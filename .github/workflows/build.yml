name: Build JClick Multi-Platform

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # --- WINDOWS BUILD JOB ---
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # Removed cache: 'pip' to prevent the error

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pynput zstandard "Nuitka[onefile]"

      - name: Extract Version
        id: get_version
        shell: bash
        run: |
          V_STR=$(grep -oP 'APP_VERSION = "\K[^"]+' jclick.py)
          echo "VERSION=$V_STR" >> $GITHUB_ENV

      - name: Build Windows EXE
        run: |
          python -m nuitka --standalone `
                           --onefile `
                           --windows-disable-console `
                           --enable-plugin=tk-inter `
                           --include-package=pynput `
                           --collect-all=pynput `
                           --output-filename=JClick-${{ env.VERSION }}.exe `
                           jclick.py

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JClick-Windows-v${{ env.VERSION }}
          path: JClick-${{ env.VERSION }}.exe

  # --- LINUX BUILD JOB ---
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # Removed cache: 'pip' to prevent the error

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libx11-dev

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pynput zstandard "Nuitka[onefile]"

      - name: Extract Version
        id: get_version
        run: |
          V_STR=$(grep -oP 'APP_VERSION = "\K[^"]+' jclick.py)
          echo "VERSION=$V_STR" >> $GITHUB_ENV

      - name: Build Linux Binary
        run: |
          python3 -m nuitka --standalone \
                            --onefile \
                            --enable-plugin=tk-inter \
                            --include-package=pynput \
                            --collect-all=pynput \
                            --output-filename=JClick-${{ env.VERSION }}.bin \
                            jclick.py

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JClick-Linux-v${{ env.VERSION }}
          path: JClick-${{ env.VERSION }}.bin
